<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Judgement Apocalypse - Remastered</title>
    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; }
        canvas { display: block; position: fixed; top: 0; left: 0; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        #ui-layer { position: absolute; top: 0; left: 0; pointer-events: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const x = c.getContext("2d");

// Cấu hình linh hoạt cho màn hình
const resize = () => {
    c.width = window.innerWidth;
    c.height = window.innerHeight;
};
window.addEventListener('resize', resize);
resize();

// --- KHỞI TẠO BIẾN ---
let state = "select";
let stage = 1;
let selected = 0;
let lastTime = 0;

// Assets (Giữ nguyên link của bạn)
const imgPaths = {
    airi: "https://i.ibb.co/FbJ31Yvv/image.png",
    kurona: "https://i.ibb.co/0pQ7qdMQ/image.png",
    midoriha: "https://i.ibb.co/svJyhVZK/image.png",
    kaizen: "https://i.ibb.co/6RTXvP9x/image.png",
    cloud: "https://i.ibb.co/9HKmV3k9/image.png",
    yorukage: "https://i.ibb.co/PvFh1sWq/image.png",
    hoshika: "https://i.ibb.co/21Tvn7Ph/image.png",
    boss1: "https://i.ibb.co/VWS48MBJ/image.png",
    boss2: "https://i.ibb.co/N2KzGczJ/image.png",
    boss3: "https://i.ibb.co/8L1x7STR/image.png",
    boss4: "https://i.ibb.co/S4W3Lvh3/image.png",
    eye: "https://i.ibb.co/d08qsBKT/image.png"
};

const images = {};
Object.entries(imgPaths).forEach(([key, src]) => {
    images[key] = new Image();
    images[key].src = src;
});

// Game Objects
let player = { x: 0, y: 0, vx: 0, vy: 0, hp: 10, maxHp: 10, r: 15, speed: 6 };
let boss = { x: 0, y: 150, hp: 200, maxHp: 200 };
let joystick = { active: false, baseX: 150, baseY: 0, stickX: 150, stickY: 0, radius: 70 };

// Bullets & Timers
let playerBullets = [], enemyBullets = [], rainBullets = [], bounceBullets = [], fireBullets = [], hoshikaLasers = [];
let ball = { x: 0, y: 0, dx: 0, dy: 0, active: false };
let ballCD = 0, timeCD = 0, midorihaCD = 0, kaizenCD = 0, sorayaCD = 0, hoshikaCD = 0;
let timeStop = false, timeDuration = 0, kaizenInvincible = false, kaizenInvincibleTime = 0, sorayaFly = 0;
let moveX = 0, moveY = 0;

// --- LOGIC ĐIỀU KHIỂN ---
c.addEventListener("pointerdown", e => {
    const tx = e.clientX, ty = e.clientY;

    if (state === "select") {
        const zone = c.width / 7;
        selected = Math.floor(tx / zone) + 1;
        initPlayer(selected);
        state = "play";
        return;
    }

    // Joystick
    if (Math.hypot(tx - joystick.baseX, ty - joystick.baseY) < joystick.radius * 1.5) {
        joystick.active = true;
    }

    // Skill Button (Góc dưới phải)
    if (Math.hypot(tx - (c.width - 100), ty - (c.height - 100)) < 50) {
        activateSkill();
    }
});

c.addEventListener("pointermove", e => {
    if (!joystick.active) return;
    const dx = e.clientX - joystick.baseX;
    const dy = e.clientY - joystick.baseY;
    const dist = Math.hypot(dx, dy);
    const limit = joystick.radius;
    
    moveX = (dist > limit) ? (dx / dist) : (dx / limit);
    moveY = (dist > limit) ? (dy / dist) : (dy / limit);
    joystick.stickX = joystick.baseX + (dist > limit ? (dx/dist)*limit : dx);
    joystick.stickY = joystick.baseY + (dist > limit ? (dy/dist)*limit : dy);
});

c.addEventListener("pointerup", () => {
    joystick.active = false;
    joystick.stickX = joystick.baseX;
    joystick.stickY = joystick.baseY;
    moveX = 0; moveY = 0;
});

function initPlayer(sel) {
    player.x = c.width / 2;
    player.y = c.height - 150;
    joystick.baseY = c.height - 150;
    joystick.stickY = c.height - 150;
    
    const specs = [
        { hp: 10, r: 10 }, { hp: 10, r: 12 }, { hp: 10, r: 12 },
        { hp: 15, r: 12 }, { hp: 10, r: 12 }, { hp: 10, r: 12 }, { hp: 10, r: 12 }
    ];
    player.maxHp = specs[sel-1].hp;
    player.hp = specs[sel-1].hp;
    player.r = specs[sel-1].r;
}

function activateSkill() {
    if (selected === 1 && ballCD <= 0) {
        const ang = Math.atan2(boss.y - player.y, boss.x - player.x);
        ball = { x: player.x, y: player.y, dx: Math.cos(ang)*10, dy: Math.sin(ang)*10, active: true };
        ballCD = 8000;
    }
    if (selected === 2 && timeCD <= 0) { timeStop = true; timeDuration = 1000; timeCD = 10000; }
    if (selected === 3 && midorihaCD <= 0) { player.hp = Math.min(player.maxHp, player.hp + 2); midorihaCD = 30000; }
    if (selected === 4 && kaizenCD <= 0) { kaizenInvincible = true; kaizenInvincibleTime = 3000; kaizenCD = 15000; }
    if (selected === 5 && sorayaCD <= 0) { sorayaFly = 3000; sorayaCD = 10000; }
    if (selected === 7 && hoshikaCD <= 0) {
        for(let a=0; a<360; a+=60) {
            let r = a * Math.PI / 180;
            hoshikaLasers.push({ dx: Math.cos(r), dy: Math.sin(r), time: 1000 });
        }
        hoshikaCD = 20000;
    }
}

// --- VÒNG LẶP CHÍNH ---
function update(dt) {
    if (state !== "play") return;

    // Cooldowns
    if (ballCD > 0) ballCD -= dt;
    if (timeCD > 0) timeCD -= dt;
    if (midorihaCD > 0) midorihaCD -= dt;
    if (kaizenCD > 0) kaizenCD -= dt;
    if (sorayaCD > 0) sorayaCD -= dt;
    if (hoshikaCD > 0) hoshikaCD -= dt;

    if (timeStop) {
        timeDuration -= dt;
        if (timeDuration <= 0) timeStop = false;
    }

    if (!timeStop) {
        player.x += moveX * player.speed;
        player.y += moveY * player.speed;
        
        // Giới hạn biên
        player.x = Math.max(player.r, Math.min(c.width - player.r, player.x));
        player.y = Math.max(player.r, Math.min(c.height - player.r, player.y));

        // Logic đạn Boss (Đơn giản hóa để mượt hơn)
        if (Math.random() < 0.05) {
            enemyBullets.push({ x: boss.x, y: boss.y, dx: (Math.random()-0.5)*8, dy: 5 });
        }
    }
    
    // Update Bullets
    enemyBullets.forEach((b, i) => {
        if (!timeStop) { b.x += b.dx; b.y += b.dy; }
        if (Math.hypot(b.x - player.x, b.y - player.y) < player.r && !kaizenInvincible) {
            player.hp -= 0.1; // Demo damage
            enemyBullets.splice(i, 1);
        }
    });
    
    // Chuyển Stage dựa trên HP Boss (Ví dụ)
    if (boss.hp < 50) stage = 4;
    else if (boss.hp < 100) stage = 3;
    else if (boss.hp < 150) stage = 2;
}

function draw() {
    x.clearRect(0, 0, c.width, c.height);

    if (state === "select") {
        drawSelection();
    } else {
        drawGame();
        drawUI();
    }
    requestAnimationFrame(main);
}

function drawSelection() {
    const chars = ["Airi", "Kurona", "Midoriha", "Kaizen", "Soraya", "Yorukage", "Hoshika"];
    const imgs = [images.airi, images.kurona, images.midoriha, images.kaizen, images.cloud, images.yorukage, images.hoshika];
    
    x.textAlign = "center";
    x.fillStyle = "#fff";
    x.font = "bold 30px Arial";
    x.fillText("SELECT YOUR GUARDIAN", c.width/2, 80);

    chars.forEach((name, i) => {
        const w = c.width / 7;
        const cx = w * i + w/2;
        x.drawImage(imgs[i], cx - 50, c.height/2 - 80, 100, 140);
        x.font = "16px Arial";
        x.fillText(name, cx, c.height/2 + 90);
    });
}

function drawGame() {
    // Vẽ Boss
    const bossImg = stage === 1 ? images.boss1 : (stage === 2 ? images.boss2 : images.boss3);
    x.drawImage(bossImg, boss.x - 60, boss.y - 60, 120, 120);

    // Vẽ Player
    x.save();
    if (kaizenInvincible) x.globalAlpha = 0.5;
    const pImg = [images.airi, images.kurona, images.midoriha, images.kaizen, images.cloud, images.yorukage, images.hoshika][selected-1];
    x.drawImage(pImg, player.x - 30, player.y - 40, 60, 80);
    x.restore();

    // Vẽ đạn
    x.fillStyle = "#ff4444";
    enemyBullets.forEach(b => {
        x.beginPath();
        x.arc(b.x, b.y, 5, 0, Math.PI*2);
        x.fill();
    });

    // Hiệu ứng Time Stop
    if (timeStop) {
        x.fillStyle = "rgba(0, 255, 255, 0.1)";
        x.fillRect(0,0,c.width,c.height);
    }
}

function drawUI() {
    // Thanh HP Boss
    x.fillStyle = "#333";
    x.fillRect(c.width/2 - 150, 20, 300, 10);
    x.fillStyle = "#f00";
    x.fillRect(c.width/2 - 150, 20, (boss.hp/200)*300, 10);

    // Thanh HP Player
    x.fillStyle = "#333";
    x.fillRect(player.x - 25, player.y + 45, 50, 6);
    x.fillStyle = "#0f0";
    x.fillRect(player.x - 25, player.y + 45, (player.hp/player.maxHp)*50, 6);

    // Joystick UI
    x.beginPath();
    x.arc(joystick.baseX, joystick.baseY, joystick.radius, 0, Math.PI*2);
    x.strokeStyle = "rgba(255,255,255,0.2)";
    x.lineWidth = 4;
    x.stroke();
    
    x.beginPath();
    x.arc(joystick.stickX, joystick.stickY, 35, 0, Math.PI*2);
    x.fillStyle = "rgba(255,255,255,0.4)";
    x.fill();

    // Skill Button
    const btnX = c.width - 100, btnY = c.height - 100;
    x.beginPath();
    x.arc(btnX, btnY, 45, 0, Math.PI*2);
    x.fillStyle = "rgba(255, 200, 0, 0.3)";
    x.fill();
    x.strokeStyle = "#fff";
    x.stroke();
    x.fillStyle = "#fff";
    x.font = "bold 14px Arial";
    x.fillText("SKILL", btnX, btnY + 5);
}

function main(t) {
    const dt = t - lastTime;
    lastTime = t;
    update(dt);
    draw();
}

requestAnimationFrame(main);
</script>
</body>
</html>
