<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Judgement Apocalypse - Full Remastered</title>
<style>
    @import url('https://fonts.googleapis.com');
    html,body{ margin:0; padding:0; overflow:hidden; background:#000; touch-action:none; font-family: 'Orbitron', sans-serif; }
    canvas{ display:block; position:fixed; top:0; left:0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
let c=document.getElementById("c");
let x=c.getContext("2d");
c.width=innerWidth; c.height=innerHeight;

// --- KHỞI TẠO ẢNH VỚI LINK CÓ SẴN ---
const airiImg = new Image(); airiImg.src = "https://i.ibb.co";
const kuronaImg = new Image(); kuronaImg.src = "https://i.ibb.co";
const midorihaImg = new Image(); midorihaImg.src = "https://i.ibb.co";
const kaizenImg = new Image(); kaizenImg.src = "https://i.ibb.co";
const cloudImg = new Image(); cloudImg.src = "https://i.ibb.co";
const yorukageImg = new Image(); yorukageImg.src = "https://i.ibb.co";
const hoshikaImg = new Image(); hoshikaImg.src = "https://i.ibb.co";
const boss1 = new Image(); boss1.src = "https://i.ibb.co";
const boss2 = new Image(); boss2.src = "https://i.ibb.co";
const boss3 = new Image(); boss3.src = "https://i.ibb.co";
const boss4 = new Image(); boss4.src = "https://i.ibb.co";

// --- BIẾN GAME (GIỮ NGUYÊN TÍNH NĂNG CŨ) ---
let state="select", stage = 1, selected=0, shake = 0;
let player={ x:c.width/2, y:c.height-150, hp:10, maxHp:10, r:15, speed:7, baseDam:2 };
let boss={ x:c.width/2, y:150, hp:1000, maxHp:1000, targetX: c.width/2 };

let playerBullets=[], enemyBullets=[], rainBullets=[], fireBullets=[];
let timeStop=false, timeDuration=0, timeCD=0;
let ball={active:false, x:0, y:0, dx:0, dy:0}, ballCD=0;
let midorihaCD=0, kaizenCD=0, kaizenInvincible=false;

let joystick = { active: false, baseX: 180, baseY: c.height - 180, stickX: 180, stickY: c.height - 180, radius: 90 };
let moveX = 0;

// --- INPUT ---
c.addEventListener("pointerdown", e => {
    let tx = e.clientX, ty = e.clientY;
    if(state==="select"){
        selected = Math.floor(tx / (c.width/7)) + 1;
        // THIẾT LẬP DAM (Kurona/Midoriha dam 1, còn lại dam 2)
        player.baseDam = (selected === 2 || selected === 3) ? 1 : 2;
        player.maxHp = (selected === 4) ? 15 : 10;
        player.hp = player.maxHp;
        state="play"; return;
    }
    if(Math.hypot(tx - joystick.baseX, ty - joystick.baseY) < 100) joystick.active = true;
    if(Math.hypot(tx-(c.width-120), ty-(c.height-120)) < 60) useSkill();
});

c.addEventListener("pointermove", e => {
    if(!joystick.active) return;
    let dx = e.clientX - joystick.baseX, dy = e.clientY - joystick.baseY;
    let dist = Math.hypot(dx, dy);
    if(dist > joystick.radius){ dx *= joystick.radius/dist; dy *= joystick.radius/dist; }
    joystick.stickX = joystick.baseX + dx; joystick.stickY = joystick.baseY + dy;
    moveX = dx / joystick.radius;
});

c.addEventListener("pointerup", () => { joystick.active = false; joystick.stickX = joystick.baseX; joystick.stickY = joystick.baseY; moveX = 0; });

function useSkill(){
    if(selected===1 && ballCD<=0){ ball.active=true; ball.x=player.x; ball.y=player.y; let ang=Math.atan2(boss.y-player.y, boss.x-player.x); ball.dx=Math.cos(ang)*10; ball.dy=Math.sin(ang)*10; ballCD=400; }
    if(selected===2 && timeCD<=0){ timeStop=true; timeDuration=120; timeCD=600; }
    if(selected===3 && midorihaCD<=0){ player.hp=Math.min(player.maxHp, player.hp+2); midorihaCD=1000; }
    if(selected===4 && kaizenCD<=0){ kaizenInvincible=true; timeDuration=180; kaizenCD=900; }
}

// --- BOSS ATTACKS (6 KIỂU ĐÁNH) ---
setInterval(() => {
    if(state!=="play" || timeStop) return;
    let bX = boss.x, bY = boss.y;
    // Kiểu 1: Bắn thường (tăng theo Stage)
    for(let i=0; i<(stage+1); i++) enemyBullets.push({x:bX, y:bY, dx:(Math.random()-0.5)*8, dy:stage+3});
    // Kiểu 2: Burn Circle (Stage 2 trở lên)
    if(stage >= 2 && Math.random() < 0.3) {
        for(let a=0; a<Math.PI*2; a+=Math.PI/3) enemyBullets.push({x:bX, y:bY, dx:Math.cos(a)*5, dy:Math.sin(a)*5});
    }
}, 800);

setInterval(() => {
    if(state!=="play" || timeStop) return;
    // Kiểu 3: Rain (Mưa đạn)
    rainBullets.push({x:Math.random()*c.width, y:-20, dy:5+Math.random()*5});
}, 400);

// --- VÒNG LẶP GAME ---
function loop(){
    x.fillStyle="#030b1a"; x.fillRect(0,0,c.width,c.height);
    if(shake > 0){ x.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake*=0.9; }

    if(state==="select") drawSelect();
    else drawBattle();

    x.setTransform(1,0,0,1,0,0);
    requestAnimationFrame(loop);
}

function drawSelect(){
    let w = c.width/7;
    let charImgs = [airiImg, kuronaImg, midorihaImg, kaizenImg, cloudImg, yorukageImg, hoshikaImg];
    let names = ["AIRI","KURONA","MIDORIHA","KAIZEN","SORAYA","YORUKAGE","HOSHIKA"];
    charImgs.forEach((img, i) => {
        x.strokeStyle="rgba(0,255,255,0.1)"; x.strokeRect(i*w, 0, w, c.height);
        x.drawImage(img, i*w+w/2-50, c.height/2-100, 100, 140);
        x.fillStyle="white"; x.textAlign="center"; x.font="14px Orbitron";
        x.fillText(names[i], i*w+w/2, c.height/2+80);
        x.fillStyle=(i===1||i===2)?"#aaa":"#ff4d4d";
        x.fillText("DAM: "+((i===1||i===2)?1:2), i*w+w/2, c.height/2+100);
    });
    x.fillStyle="cyan"; x.font="30px Orbitron"; x.fillText("SELECT CHARACTER", c.width/2, 100);
}

function drawBattle(){
    // Chuyển Stage dựa trên HP
    if(boss.hp < 200) stage=4; else if(boss.hp < 500) stage=3; else if(boss.hp < 800) stage=2;
    let bImg = [boss1, boss2, boss3, boss4][stage-1];
    
    // Vẽ Boss & Player
    x.drawImage(bImg, boss.x-75, boss.y-75, 150, 150);
    let pImg = [airiImg, kuronaImg, midorihaImg, kaizenImg, cloudImg, yorukageImg, hoshikaImg][selected-1];
    if(kaizenInvincible) x.globalAlpha = 0.5;
    x.drawImage(pImg, player.x-30, player.y-40, 60, 80);
    x.globalAlpha = 1;

    // Logic Di chuyển
    player.x += moveX * player.speed;
    player.x = Math.max(30, Math.min(c.width-30, player.x));
    if(!timeStop){
        boss.x += (boss.targetX - boss.x) * 0.02;
        if(Math.abs(boss.x - boss.targetX) < 10) boss.targetX = Math.random()*(c.width-200)+100;
    } else { timeDuration--; if(timeDuration<=0) timeStop=false; }

    // Xử lý đạn Player (Tự bắn)
    if(Date.now()%150 < 20) playerBullets.push({x:player.x, y:player.y-30});
    playerBullets.forEach((b,i) => {
        b.y -= 12; x.fillStyle="yellow"; x.fillRect(b.x-2, b.y, 4, 15);
        if(Math.hypot(b.x-boss.x, b.y-boss.y) < 60){ boss.hp -= player.baseDam; playerBullets.splice(i,1); shake=3; }
    });

    // Xử lý đạn Boss & Va chạm
    [...enemyBullets, ...rainBullets].forEach((b,i) => {
        if(!timeStop){ b.x+=(b.dx||0); b.y+=b.dy; }
        x.fillStyle = b.dx ? "#ff00ff" : "#fff";
        x.beginPath(); x.arc(b.x, b.y, 5, 0, 7); x.fill();
        
        if(Math.hypot(b.x-player.x, b.y-player.y) < 25 && !kaizenInvincible){
            // PASSIVE KURONA: GIẢM 50% DAM
            player.hp -= (selected === 2) ? 0.5 : 1;
            shake = 15;
            if(enemyBullets.includes(b)) enemyBullets.splice(enemyBullets.indexOf(b),1);
            else rainBullets.splice(rainBullets.indexOf(b),1);
        }
    });

    // Skill quả cầu của Airi
    if(ball.active){
        ball.x += ball.dx; ball.y += ball.dy;
        x.fillStyle="cyan"; x.beginPath(); x.arc(ball.x, ball.y, 15, 0, 7); x.fill();
        if(Math.hypot(ball.x-boss.x, ball.y-boss.y)<70){ boss.hp -= 10; ball.active=false; shake=20; }
    }

    // HUD (Giao diện)
    x.fillStyle="#222"; x.fillRect(c.width/2-200, 30, 400, 10);
    x.fillStyle="red"; x.fillRect(c.width/2-200, 30, (boss.hp/boss.maxHp)*400, 10);
    for(let i=0; i<player.maxHp; i++){
        x.fillStyle = i<player.hp ? "#00ff88" : "#333";
        x.fillRect(30+i*22, c.height-40, 18, 8);
    }

    // Điều khiển
    x.beginPath(); x.arc(joystick.baseX, joystick.baseY, joystick.radius, 0, 7); x.strokeStyle="rgba(255,255,255,0.2)"; x.stroke();
    x.beginPath(); x.arc(joystick.stickX, joystick.stickY, 35, 0, 7); x.fillStyle="rgba(255,255,255,0.4)"; x.fill();
    x.beginPath(); x.arc(c.width-120, c.height-120, 60, 0, 7); x.strokeStyle="white"; x.stroke();
    x.fillStyle="white"; x.textAlign="center"; x.fillText("SKILL", c.width-120, c.height-115);

    // Xử lý CD
    if(ballCD>0) ballCD--; if(timeCD>0) timeCD--; if(midorihaCD>0) midorihaCD--; if(kaizenCD>0) kaizenCD--;
    if(kaizenInvincible){ timeDuration--; if(timeDuration<=0) kaizenInvincible=false; }

    if(player.hp <= 0 || boss.hp <= 0){ alert(player.hp<=0?"GAME OVER":"VICTORY!"); location.reload(); }
}
loop();
</script>
</body>
</html>
