c.addEventListener("pointermove", e => {

if(!joystick.active) return;

let tx = e.clientX;
let ty = e.clientY;

let dx = tx - joystick.baseX;
let dy = ty - joystick.baseY;

let dist = Math.hypot(dx, dy);

if(dist > joystick.radius){
    dx = dx / dist * joystick.radius;
    dy = dy / dist * joystick.radius;
}

joystick.stickX = joystick.baseX + dx;
joystick.stickY = joystick.baseY + dy;

moveX = dx / joystick.radius;
moveY = dy / joystick.radius;

});

let lastTime = 0;

function cleanupObjects() {
    // Gom tất cả mảng vào một mảng lớn để xử lý một lượt
    const arraysToClean = [
        playerBullets, rainBullets, enemyBullets, bounceBullets, 
        fireBullets, eyeBullets, hunterBullets, moonBullets, 
        yurineShots, erinSkulls, sponkoBubbles, okunaPortal
    ];

    arraysToClean.forEach(arr => {
        // Lặp ngược từ cuối mảng lên đầu để tránh lỗi nhảy phần tử khi splice
        for (let i = arr.length - 1; i >= 0; i--) {
            let obj = arr[i];
            
            // Kiểm tra nếu vật thể ra ngoài biên 200px
            if (obj.x < -200 || 
                obj.x > c.width + 200 || 
                obj.y < -200 || 
                obj.y > c.height + 200) {
                
                arr.splice(i, 1);
            }
        }
    });
}

    x.fillStyle = sponkoOn ? "rgba(0,255,0,0.25)" : "rgba(255,255,255,0.15)";
    x.beginPath();
    x.arc(uiX, uiY, 60, 0, Math.PI*2);
    x.fill();

    // viền
    x.strokeStyle = sponkoOn ? "lime" : "white";
    x.lineWidth = 4;
    x.stroke();

    // text
    x.fillStyle = "white";
    x.font = "12px Arial";
    x.textAlign = "center";

    if(sponkoOn){
        x.fillText("🪀/miracle toys is active", uiX, uiY + 5);
    }else{
        x.fillText("🪀/miracle toys is not active", uiX, uiY + 5);
    }
}

if(state === "play" && selected === 30){

    let uiX = c.width - 120;
    let uiY = c.height - 300;

    x.fillStyle = hinaOn ? "rgba(0,255,0,0.25)" : "rgba(255,255,255,0.15)";
    x.beginPath();
    x.arc(uiX, uiY, 60, 0, Math.PI*2);
    x.fill();

    x.strokeStyle = hinaOn ? "lime" : "white";
    x.lineWidth = 4;
    x.stroke();

    x.fillStyle = "white";
    x.font = "12px Arial";
    x.textAlign = "center";

    if(hinaOn){
        x.fillText("leaf doll is active", uiX, uiY + 5);
    }else{
        x.fillText("leaf doll is not active", uiX, uiY + 5);
    }
}

if(state === "play" && selected === 1){

    let uiX = c.width - 120;
    let uiY = c.height - 300;

// nền
if(airiCD > 0){
    x.fillStyle = "rgba(150,150,150,0.25)"; // xám khi đang CD
}else{
    x.fillStyle = airiDisappear ? "rgba(0,255,0,0.25)" : "rgba(255,255,255,0.15)";
}

    x.beginPath();
    x.arc(uiX, uiY, 60, 0, Math.PI*2);
    x.fill();

    // viền
    if(airiCD > 0){
        x.strokeStyle = "gray";
    }else{
        x.strokeStyle = airiDisappear ? "lime" : "white";
    }

    x.lineWidth = 4;
    x.stroke();

    // text
    x.fillStyle = "white";
    x.font = "12px Arial";
    x.textAlign = "center";

if(airiCD > 0){
    x.fillText("Disappear from the reality", uiX, uiY - 2);
    x.fillText("Cooldown: " + Math.ceil(airiCD/1000), uiX, uiY + 15);
}else if(airiDisappear){
    x.fillText("Disappear from the reality", uiX, uiY - 2);
    x.fillText("(Active)", uiX, uiY + 15);
}else{
    x.fillText("Disappear from the reality", uiX, uiY + 5);
}
}
// ================= END =================



if(player.hp <= 0){

    // ===== OKYNA =====
    if(selected===8){

        if(!okunaPhase2){
            okunaPhase2 = true;
            player.hp = player.maxHp;
            okunaShield = 2000;

            requestAnimationFrame(game);
            return;
        }
        else if(okunaPhase2 && !okunaPhase3){
            okunaPhase3 = true;
            player.maxHp = 20;
            player.hp = 20;
            okunaShield = 3000;

            requestAnimationFrame(game);
            return;
        }
    }

    // ===== MITOKAMI REVIVE =====
    if(selected===19 && !mitokamiRevive){

        mitokamiRevive = true;

        player.maxHp = 100;
        player.hp = 100;

        requestAnimationFrame(game);
        return;
    }

if(player.hp <= 0 && selected===23 && kiwasenaRevive){
    kiwasenaRevive = false;
    player.hp = player.maxHp;

        requestAnimationFrame(game);
        return;

}

if(player.hp <= 0 && selected===24 && erinRevive){
    erinRevive = false;
    player.hp = player.maxHp;

        requestAnimationFrame(game);
        return;

}

    // ===== YURINE RESPAWN =====
    if(selected===13){

        yurineLives++;

        if(yurineLives <= 10){

            let hpList = [
            5, 2.5, 1.25, 0.62, 0.31,
            0.15, 0.07, 0.03, 0.01, 0.001
            ];

            player.maxHp = hpList[yurineLives-1];
            player.hp = player.maxHp;

            player.x = c.width/2;
            player.y = c.height-120;

            player.vx = 0;
            player.vy = 0;

            requestAnimationFrame(game);
            return;

        }else{
            x.fillText("GAME OVER",c.width/2-150,c.height/2);
            gameOver = true;
            return;
        }
    }

    // ===== NORMAL GAME OVER =====
    x.font="50px Arial";
    x.fillStyle="red";

    x.textAlign = "center";

    x.fillText("GAME OVER",c.width/2-120,c.height/2);

    gameOver = true;
    return;
}

if(boss.hp<=0 && stage===1){
stage=8;
boss.hp=200;
boss.maxHp=200;
boss.x=c.width/2;
boss.y=150;
}

if(boss.hp<=0 && stage===8){
stage=2;
boss.hp=350;
boss.maxHp=350;
boss.x=c.width/2;
boss.y=150;
}

else if(boss.hp<=0 && stage===2){
stage=3;
boss.hp=500;
boss.maxHp=500;
boss.x=c.width/2;
boss.y=150;
}

else if(boss.hp<=0 && stage===3){
stage=4;
boss.hp=800;
boss.maxHp=800;
boss.x=c.width/2;
boss.y=150;
}

else if(boss.hp<=0 && stage===4){
stage=5;
boss.hp=1000;
boss.maxHp=1000;
boss.x=c.width/2;
boss.y=150;
}

else if(boss.hp<=0 && stage===5){
stage=6;
boss.hp=1200;
boss.maxHp=1200;
boss.x=c.width/2;
boss.y=150;
}

else if(stage === 6 && boss.hp <= 0){
    state = "win";
    winScreen = true;
    paused = true; // ⬅️ thêm dòng này
}

if(state === "win"){

    x.fillStyle = "lime";
    x.font = "50px Arial";
    x.textAlign = "center";
    x.fillText("YOU WIN MAIN STAGE", c.width/2, c.height/2);
gameOver = true;
    return;
}

else if(boss.hp <= 0 && stage === 7){
    x.fillStyle = "lime";
    x.font = "50px Arial";
    x.textAlign = "center";
    x.fillText("YOU WIN IMPOSSIBLE STAGE", c.width/2, c.height/2);
    gameOver = true;
    return;
}

requestAnimationFrame(game);
}

game();
