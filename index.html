<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bullet Hell Boss</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #030b1a;
}

canvas {
    display: block;
}
</style>

</head>
<body>

<canvas id="c"></canvas>

<script>
/* ================= DÁN TOÀN BỘ JS CỦA BẠN VÀO ĐÂY ================= */

let c=document.getElementById("c");
let x=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let state="select";
let selected=0;

let airiImg=new Image();
airiImg.src="https://i.ibb.co/FbJ31Yvv/image.png";

let kuronaImg=new Image();
kuronaImg.src="https://i.ibb.co/0pQ7qdMQ/image.png";

let midorihaImg=new Image();
midorihaImg.src="https://i.ibb.co/svJyhVZK/image.png";

let kaizenImg = new Image();
kaizenImg.src = "https://i.ibb.co/6RTXvP9x/image.png";

let bossImg=new Image();
bossImg.src="https://i.ibb.co/VWS48MBJ/image.png";

let player={
x:c.width/2,
y:c.height-120,
vy:0,
jump:0,
hp:10,
maxHp: 10,
r:15,
speed:6
};

let boss={
x:c.width/2,
y:150,
hp:500
};

let playerBullets=[];
let rainBullets=[];
let enemyBullets=[];
let bounceBullets=[];
let lasers=[];

let ball={
x:0,
y:0,
dx:0,
dy:0,
active:false
};

let ballCD=0;
let midorihaCD=0;
let midorihaRegenTimer = 0;

let kaizenCD = 0;
let kaizenInvincible = false;
let kaizenInvincibleTime = 0;

let timeStop=false;
let timeCD=0;
let timeDuration=0;

let spikeTimer=0;
let spikeActive=false;
let spikeWarning=0;
let platforms=[];

let laserCD = 10000;
let spikeCD = 20000;

let gravity=0.8;

let moveLeft=false;
let moveRight=false;





// ================= INPUT =================

c.addEventListener("pointerdown",e=>{

let tx=e.clientX;
let ty=e.clientY;

if(state==="select"){

if(tx < c.width/4){
selected=1;
player.r=10;
player.maxHp = 10;
player.hp = 10;
}
else if(tx < c.width/2){
selected=2;
player.r=12;
player.maxHp = 10;
player.hp = 10;
}
else if(tx < c.width*3/4){
selected=3;
player.r=12;
player.maxHp = 10;
player.hp = 10;
}
else{
selected=4; // Kaizen
player.r=12;
player.maxHp = 15;
player.hp = 15;
}

state="play";
return;
}

// LEFT BUTTON
if(Math.hypot(tx-60,ty-(c.height-130))<35){
moveLeft=true;
return;
}

// RIGHT BUTTON
if(Math.hypot(tx-140,ty-(c.height-130))<35){
moveRight=true;
return;
}

// JUMP BUTTON
if(Math.hypot(tx-60,ty-(c.height-60))<35){
if(player.jump===0){
player.vy=-18;
player.jump=1;
}
return;
}

// SKILL BUTTON
if(Math.hypot(tx-(c.width-60),ty-(c.height-60))<35){

if(selected===1 && ballCD<=0){

   let ang = Math.atan2(boss.y-player.y, boss.x-player.x);

   ball.x = player.x;
   ball.y = player.y;
   ball.dx = Math.cos(ang) * 10;
   ball.dy = Math.sin(ang) * 10;
   ball.active = true;

   ballCD = 8000;
}

// KURONA
if(selected===2 && timeCD<=0){
   timeStop = true;
   timeDuration = 1000;
   timeCD = 10000;
}

// MIDORIHA
if(selected===3 && midorihaCD<=0){
player.hp += 2;
if(player.hp > player.maxHp) player.hp = player.maxHp;
   midorihaCD = 20000;
}

// KAIZEN
if(selected===4 && kaizenCD<=0){
   kaizenInvincible = true;
   kaizenInvincibleTime = 3000; // 3 giây bất tử
   kaizenCD = 15000; // hồi chiêu 15s
}

}

});

c.addEventListener("pointerup",()=>{
moveLeft=false;
moveRight=false;
});




// ================= AUTO AIM =================

setInterval(()=>{

if(state!=="play")return;

let dmg =
selected===1 ? 2 :
selected===4 ? 2 :
1;

let speed=(selected===2 && timeStop)?18:7;

let ang=Math.atan2(boss.y-player.y,boss.x-player.x);

playerBullets.push({
x:player.x,
y:player.y,
dx:Math.cos(ang)*speed,
dy:Math.sin(ang)*speed,
dmg:dmg
});

},400);




// ================= BOSS ATTACKS =================

// NORMAL SHOTS (tăng số lượng)

setInterval(()=>{
if(state!=="play" || timeStop) return;

for(let i=0;i<3;i++){
enemyBullets.push({
x:boss.x,
y:boss.y,
dx:(Math.random()-0.5)*8,
dy:6+Math.random()*3
});
}

},800);



// RAIN (nhiều hơn)

setInterval(()=>{
if(state!=="play" || timeStop) return;

for(let i=0;i<4;i++){
rainBullets.push({
x:Math.random()*c.width,
y:-10,
dy:7+Math.random()*3
});
}

},600);



// BOUNCE (nhiều hơn)

setInterval(()=>{
if(state!=="play" || timeStop) return;

for(let i=0;i<2;i++){
bounceBullets.push({
x:boss.x,
y:boss.y,
dx:(Math.random()-0.5)*9,
dy:7
});
}

},1500);














// ================= GAME LOOP =================

let lastTime = 0;

function game(currentTime){

let delta = currentTime - lastTime;
lastTime = currentTime;

x.fillStyle="#030b1a";
x.fillRect(0,0,c.width,c.height);

if(state==="select"){

x.fillStyle="white";
x.font="30px Arial";
x.fillText("SELECT CHARACTER",c.width/2-160,100);

x.font="20px Arial";

x.drawImage(airiImg,c.width/8-60,c.height/2-80,120,160);
x.fillText("Airi",c.width/8-30,c.height/2+120);

x.drawImage(kuronaImg,c.width*3/8-60,c.height/2-80,120,160);
x.fillText("Kurona",c.width*3/8-60,c.height/2+120);

x.drawImage(midorihaImg,c.width*5/8-60,c.height/2-80,120,160);
x.fillText("Midoriha",c.width*5/8-80,c.height/2+120);

x.drawImage(kaizenImg,c.width*7/8-60,c.height/2-80,120,160);
x.fillText("Kaizen",c.width*7/8-60,c.height/2+120);

requestAnimationFrame(game);
return;
}





// TIME STOP

if(timeCD>0)timeCD-=delta;
if(ballCD>0) ballCD-=delta;
if(midorihaCD>0) midorihaCD-=delta;
if(kaizenCD>0) kaizenCD-=delta;

// LASER TIMER
if(!timeStop){
    laserCD -= delta;
    if(laserCD <= 0){
        lasers.push({warning:1000,time:3000});
        laserCD = 10000;
    }
}

// SPIKE TIMER
if(!timeStop){
    spikeCD -= delta;
    if(spikeCD <= 0){
        spikeWarning = 1000;
        platforms = [];
        for(let i=0;i<3;i++){
            platforms.push({
                x:Math.random()*(c.width-120),
                y:c.height-170
            });
        }
        spikeCD = 20000;
    }
}

if(kaizenInvincible){
   kaizenInvincibleTime -= delta;
   if(kaizenInvincibleTime <= 0){
      kaizenInvincible = false;
   }
}

// MIDORIHA PASSIVE REGEN
if(selected===3){
    midorihaRegenTimer += delta;

    if(midorihaRegenTimer >= 100){ // 0.1 giây
        player.hp += 0.01;
        if(player.hp > player.maxHp) player.hp = player.maxHp;
        midorihaRegenTimer = 0;
    }
}

if(timeDuration>0){
timeDuration-=delta;
}else{
timeStop=false;
}

if(timeStop){
x.fillStyle="rgba(150,150,150,0.3)";
x.fillRect(0,0,c.width,c.height);
}





// ================= MOVEMENT =================

if(moveLeft){
player.x-=player.speed;
}

if(moveRight){
player.x+=player.speed;
}

if(player.x<30)player.x=30;
if(player.x>c.width-30)player.x=c.width-30;





// ================= GRAVITY + PLATFORM COLLISION =================

player.vy+=gravity;
player.y+=player.vy;

let onPlatform=false;

platforms.forEach(p=>{

if(
player.x>p.x-20 &&
player.x<p.x+140 &&
player.y+40>p.y &&
player.y+40<p.y+20 &&
player.vy>=0
){
player.y=p.y-40;
player.vy=0;
player.jump=0;
onPlatform=true;
}

});

if(player.y>c.height-120){
player.y=c.height-120;
player.vy=0;
player.jump=0;
}






// ================= DRAW PLAYER =================

if(selected===1){
x.drawImage(airiImg,player.x-30,player.y-70,60,80);
}
else if(selected===2){
x.drawImage(kuronaImg,player.x-30,player.y-70,60,80);
}
else if(selected===3){
x.drawImage(midorihaImg,player.x-30,player.y-70,60,80);
}
else if(selected===4){
x.drawImage(kaizenImg,player.x-30,player.y-70,60,80);
}

// KAIZEN AURA
if(selected===4 && kaizenInvincible){

// vòng ngoài
x.strokeStyle="skyblue";
x.lineWidth=6;
x.beginPath();
x.arc(player.x,player.y,60,0,Math.PI*2);
x.stroke();

// glow nhẹ
x.fillStyle="rgba(135,206,235,0.15)";
x.beginPath();
x.arc(player.x,player.y,60,0,Math.PI*2);
x.fill();

}





// ================= PLAYER BULLETS =================

x.fillStyle="cyan";

playerBullets.forEach(b=>{

if(!timeStop){
b.x+=b.dx;
b.y+=b.dy;
}

x.beginPath();
x.arc(b.x,b.y,5,0,7);
x.fill();

if(Math.hypot(b.x-boss.x,b.y-boss.y)<60){
boss.hp-=b.dmg;
b.y=-100;
}

});






// ================= AIRI ORB =================

if(ball.active){

if(!timeStop){
ball.x+=ball.dx;
ball.y+=ball.dy;
}

// nếu ra khỏi màn hình thì biến mất
if(ball.x<0 || ball.x>c.width || ball.y<0 || ball.y>c.height){
ball.active=false;
}

// chạm boss -> gây 10 damage và biến mất
if(Math.hypot(ball.x-boss.x,ball.y-boss.y)<70){
boss.hp-=10;
ball.active=false;
}

// vẽ bóng nếu còn tồn tại
if(ball.active){
x.fillStyle="skyblue";
x.beginPath();
x.arc(ball.x,ball.y,12,0,7);
x.fill();
}

}






// ================= ENEMY BULLETS =================

x.fillStyle="orange";

enemyBullets.forEach(b=>{

if(!timeStop){
b.x+=b.dx;
b.y+=b.dy;
}

x.beginPath();
x.arc(b.x,b.y,6,0,7);
x.fill();

if(Math.hypot(b.x-player.x,b.y-player.y)<player.r){
if(!kaizenInvincible){
   player.hp-=1*(selected===2?0.5:1);
}
b.y=c.height+100;
}

});






// ================= RAIN =================

x.fillStyle="red";

rainBullets.forEach(b=>{

if(!timeStop){
b.y+=b.dy;
}

x.beginPath();
x.arc(b.x,b.y,6,0,7);
x.fill();

if(Math.hypot(b.x-player.x,b.y-player.y)<player.r){
if(!kaizenInvincible){
   player.hp-=1*(selected===2?0.5:1);
}
b.y=c.height+100;
}

});






// ================= BOUNCE =================

x.fillStyle="purple";

bounceBullets.forEach(b=>{

if(!timeStop){
b.x+=b.dx;
b.y+=b.dy;
}

if(b.y>c.height-10){
b.dy*=-1;
}

x.beginPath();
x.arc(b.x,b.y,8,0,7);
x.fill();

if(Math.hypot(b.x-player.x,b.y-player.y)<player.r){
if(!kaizenInvincible){
   player.hp-=1*(selected===2?0.5:1);
}
b.y=c.height+100;
}

});






// ================= LASER =================

lasers.forEach(l=>{

if(!timeStop){
if(l.warning>0){
l.warning-=delta;
}else{
l.time-=delta;
}
}

if(l.warning>0){

x.fillStyle="red";
x.font="60px Arial";
x.fillText("!",c.width/2-10,c.height/2);

}else if(l.time>0){

x.fillStyle="rgba(255,0,0,0.4)";
x.fillRect(c.width/2-30,0,60,c.height);

if(player.x>c.width/2-30 && player.x<c.width/2+30){
if(!kaizenInvincible){
player.hp-=0.1*(selected===2?0.5:1);
}
}

}

});






// ================= SPIKE =================

if(!timeStop){

if(spikeWarning>0){
spikeWarning-=delta;
if(spikeWarning<=0){
spikeActive=true;
spikeTimer=5000;
}
}

if(spikeActive){
spikeTimer-=delta;
if(spikeTimer<=0){
spikeActive=false;
platforms=[];
}
}

}

if(spikeWarning>0){
x.fillStyle="red";
x.font="50px Arial";
x.fillText("!",c.width/2-10,c.height-30);
}

if(spikeActive){

x.fillStyle="red";
x.fillRect(0,c.height-40,c.width,40);

if(!onPlatform && player.y>c.height-140){
if(!kaizenInvincible){
player.hp-=0.1*(selected===2?0.5:1);
}
}

}






// ================= DRAW PLATFORMS =================

x.fillStyle="white";

platforms.forEach(p=>{
x.fillRect(p.x,p.y,120,12);
});






// ================= DRAW BOSS =================

x.drawImage(bossImg,boss.x-80,boss.y-80,160,160);






// ================= UI =================

x.fillStyle="white";
x.font="20px Arial";
x.fillText("HP: "+player.hp.toFixed(2)+"/"+player.maxHp,20,30);
x.fillText("Boss HP: "+boss.hp,20,55);






// LEFT BUTTON
x.fillStyle="white";
x.beginPath();
x.arc(60,c.height-130,35,0,7);
x.fill();
x.fillStyle="black";
x.fillText("L",50,c.height-120);



// RIGHT BUTTON
x.fillStyle="white";
x.beginPath();
x.arc(140,c.height-130,35,0,7);
x.fill();
x.fillStyle="black";
x.fillText("R",130,c.height-120);



// JUMP BUTTON
x.fillStyle="white";
x.beginPath();
x.arc(60,c.height-60,35,0,7);
x.fill();
x.fillStyle="black";
x.fillText("J",50,c.height-50);



// SKILL BUTTON
let onCD = 
(selected===1 && ballCD>0) ||
(selected===2 && timeCD>0) ||
(selected===3 && midorihaCD>0) ||
(selected===4 && kaizenCD>0);

x.fillStyle=onCD?"gray":"gold";
x.beginPath();
x.arc(c.width-60,c.height-60,35,0,7);
x.fill();

x.fillStyle="black";
x.font="30px Arial";
x.fillText("★",c.width-70,c.height-45);






// ================= END =================

if(player.hp<=0){
x.font="50px Arial";
x.fillStyle="red";
x.fillText("GAME OVER",c.width/2-150,c.height/2);
return;
}

if(boss.hp<=0){
x.font="50px Arial";
x.fillStyle="lime";
x.fillText("YOU WIN",c.width/2-120,c.height/2);
return;
}

requestAnimationFrame(game);
}

game();

/* ================= HẾT JS ================= */
</script>

</body>
</html>
